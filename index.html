<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@200;400;600;800;900&display=swap" rel="stylesheet">
    <<link rel="stylesheet" href="styles.css">>
</head>
<body>
    <!-- پس‌زمینه -->
    <div class="bg-layer" aria-hidden="true">
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
        <div class="bg-blob"></div>
    </div>
    <div class="particles" id="particles" aria-hidden="true"></div>
    <div class="deco-line" aria-hidden="true"></div>
    <div class="deco-line" aria-hidden="true"></div>
    <div class="deco-line" aria-hidden="true"></div>

    <!-- توست پیام -->
    <div class="toast" id="toast" role="alert">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span id="toastMsg"></span>
    </div>

    <!-- کارت ثبت‌نام -->
    <main class="register-card">
        <header class="card-header">
            <div class="card-icon" aria-hidden="true">
                <!-- آیکون کاربر+پلاس -->
                <svg viewBox="0 0 24 24">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
            </div>
            <h1>ثبت‌نام کنید</h1>
            <p>اطلاعات خود را وارد کنید تا حساب کاربری بسازید</p>
        </header>

        <form id="registerForm" novalidate autocomplete="off">
            <!-- ایمیل -->
            <div class="form-group">
                <label class="form-label" for="email">ایمیل</label>
                <div class="input-wrapper">
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="name@example.com"
                        dir="ltr"
                        aria-describedby="emailError"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="M22 7l-10 7L2 7"/>
                    </svg>
                </div>
                <div class="error-msg" id="emailError" role="alert">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span></span>
                </div>
            </div>

            <!-- رمز عبور -->
            <div class="form-group">
                <label class="form-label" for="password">رمز عبور</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="حداقل ۶ کاراکتر"
                        dir="ltr"
                        aria-describedby="passError"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <button type="button" class="toggle-pass" id="togglePass" aria-label="نمایش رمز عبور">
                        <svg id="eyeIcon" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="strength-bar-container" id="strengthBar">
                    <span class="strength-label" id="strengthLabel"></span>
                    <div class="strength-segment" id="seg1"></div>
                    <div class="strength-segment" id="seg2"></div>
                    <div class="strength-segment" id="seg3"></div>
                    <div class="strength-segment" id="seg4"></div>
                </div>
                <div class="error-msg" id="passError" role="alert">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span></span>
                </div>
            </div>

            <!-- جنسیت -->
            <div class="form-group">
                <label class="form-label">جنسیت</label>
                <div class="gender-options" role="radiogroup" aria-label="انتخاب جنسیت">
                    <div class="gender-option">
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male">
                            <svg viewBox="0 0 24 24">
                                <circle cx="10" cy="14" r="5"/>
                                <line x1="21" y1="3" x2="14" y2="10"/>
                                <polyline points="15 3 21 3 21 9"/>
                            </svg>
                            مرد
                        </label>
                    </div>
                    <div class="gender-option">
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="10" r="5"/>
                                <line x1="12" y1="15" x2="12" y2="22"/>
                                <line x1="9" y1="19" x2="15" y2="19"/>
                            </svg>
                            زن
                        </label>
                    </div>
                </div>
                <div class="error-msg" id="genderError" role="alert">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span></span>
                </div>
            </div>

            <!-- دکمه ثبت‌نام -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <div class="btn-text">
                    ثبت‌نام
                    <span class="btn-arrow">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                    </span>
                </div>
                <div class="spinner"></div>
            </button>
        </form>
    </main>
</body>
<script src="script.js"></script>
</html>
